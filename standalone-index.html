<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM-GPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            border:  '#e4e7ec',
            input:   '#e4e7ec',
            background: '#ffffff',
            foreground: '#111827',
            primary:  { DEFAULT: '#2563eb', foreground: '#ffffff' },
            secondary: { DEFAULT: '#f3f4f6', foreground: '#111827' },
            muted:    { DEFAULT: '#f3f4f6', foreground: '#6b7280' },
            card:     { DEFAULT: '#ffffff',  foreground: '#111827' },
            navy:     { DEFAULT: '#0f172a',  foreground: '#ffffff' },
            success:  { DEFAULT: '#16a34a',  foreground: '#ffffff' },
            warning:  { DEFAULT: '#d97706',  foreground: '#ffffff' },
            destructive: { DEFAULT: '#dc2626', foreground: '#ffffff' },
          },
          borderRadius: { lg: '0.5rem', md: '0.375rem', sm: '0.25rem' },
        },
      },
    };
  </script>
  <style>
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fade-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse-s { 0%,100%{opacity:1} 50%{opacity:.45} }
    .animate-spin    { animation: spin    1s linear infinite; }
    .animate-fade-in { animation: fade-in .35s ease-out both; }
    .animate-pulse-s { animation: pulse-s 2s ease-in-out infinite; }
    .page { display:none; }
    .page.active { display:block; }
    /* OTP boxes */
    .otp-box { width:2.8rem; height:3rem; text-align:center; font-size:1.25rem; font-weight:600;
      border:1.5px solid #e4e7ec; border-radius:.5rem; outline:none; transition:border-color .15s; }
    .otp-box:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
    /* Drag active */
    .dz-active { border-color:#2563eb !important; background:#eff6ff !important; }
    /* Print */
    @media print { #navbar, .no-print { display:none !important; } }
  </style>
</head>
<body class="bg-background text-foreground font-sans antialiased min-h-screen">

<!-- ═══════════════════════ NAVBAR ═══════════════════════ -->
<nav id="navbar" class="sticky top-0 z-50 border-b border-white/10 bg-navy hidden">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
    <button onclick="navigate('landing')" class="text-white font-bold text-lg tracking-tight">PM-GPS</button>
    <div class="relative">
      <button id="avatar-btn" onclick="toggleMenu()" class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <div id="user-menu" class="hidden absolute right-0 mt-2 w-40 bg-white border border-border rounded-lg shadow-lg py-1 z-50">
        <button onclick="navigate('results');closeMenu()" class="w-full text-left px-4 py-2 text-sm hover:bg-secondary">My results</button>
        <button onclick="signOut()" class="w-full text-left px-4 py-2 text-sm hover:bg-secondary">Sign out</button>
      </div>
    </div>
  </div>
</nav>

<!-- ═══════════════════════ PAGES ═══════════════════════ -->
<div id="page-landing"       class="page"></div>
<div id="page-login"         class="page"></div>
<div id="page-upload"        class="page"></div>
<div id="page-questionnaire" class="page"></div>
<div id="page-processing"    class="page"></div>
<div id="page-results"       class="page"></div>

<!-- ═══════════════════════ TOAST ═══════════════════════ -->
<div id="toasts" class="fixed bottom-4 right-4 z-[200] flex flex-col gap-2 no-print"></div>

<script>
// ─────────────────────────────────────────────
// CONFIGURATION  ← change before running
// ─────────────────────────────────────────────
const API_URL        = 'http://localhost:3000';
const SUPABASE_URL   = ''; // fill in from .env
const SUPABASE_ANON_KEY = ''; // fill in from .env

// ─────────────────────────────────────────────
// SUPABASE
// ─────────────────────────────────────────────
let sb = null;
if (SUPABASE_URL && SUPABASE_ANON_KEY) {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  token:     localStorage.getItem('pmgps_token'),
  sessionId: localStorage.getItem('pmgps_session_id'),
  stagedFiles: { cv: [], cover: [] },
  uploadMode:  { cv: 'file', cover: 'file' },
  uploadedDocs: [],
  qStep: 1,
  qData: {},
  selectedRole: null,
  otpSent: false,
  phone: '',
  socket: null,
};

// ─────────────────────────────────────────────
// TOKEN HELPERS
// ─────────────────────────────────────────────
function setToken(t)   { S.token = t; localStorage.setItem('pmgps_token', t); }
function removeToken() { S.token = null; localStorage.removeItem('pmgps_token'); }
function authHdr()     { return S.token ? { Authorization: `Bearer ${S.token}` } : {}; }

async function apiFetch(path, opts = {}) {
  const isFormData = opts.body instanceof FormData;
  const headers = {
    ...(isFormData ? {} : { 'Content-Type': 'application/json' }),
    ...authHdr(),
    ...(opts.headers || {}),
  };
  const res = await fetch(`${API_URL}${path}`, { ...opts, headers });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Request failed (${res.status})`);
  }
  return res.json();
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function toast(msg, type = 'default') {
  const t = document.createElement('div');
  const c = {
    default: 'bg-white border-border text-foreground',
    error:   'bg-red-50 border-red-200 text-red-700',
    success: 'bg-green-50 border-green-200 text-green-700',
  }[type] || 'bg-white border-border text-foreground';
  t.className = `px-4 py-3 rounded-lg border shadow-lg text-sm max-w-xs animate-fade-in ${c}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ─────────────────────────────────────────────
// ROUTER
// ─────────────────────────────────────────────
function navigate(page) { window.location.hash = page; }
function currentPage()  { return window.location.hash.replace('#','') || 'landing'; }

function render() {
  const page = currentPage();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const navbar = document.getElementById('navbar');
  navbar.style.display = page === 'landing' ? 'none' : 'block';
  const el = document.getElementById(`page-${page}`);
  if (!el) { navigate('landing'); return; }
  const fn = { landing: renderLanding, login: renderLogin, upload: renderUpload,
                questionnaire: renderQuestionnaire, processing: renderProcessing, results: renderResults }[page];
  if (fn) fn();
  el.classList.add('active');
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', render);
window.addEventListener('load', () => {
  // handle OAuth callback token in query string
  const p = new URLSearchParams(window.location.search);
  if (p.get('token')) {
    setToken(p.get('token'));
    window.history.replaceState({}, '', window.location.pathname + '#upload');
    createSession().then(() => render());
    return;
  }
  render();
});

// ─────────────────────────────────────────────
// NAVBAR MENU
// ─────────────────────────────────────────────
function toggleMenu() { document.getElementById('user-menu').classList.toggle('hidden'); }
function closeMenu()  { document.getElementById('user-menu').classList.add('hidden'); }
document.addEventListener('click', e => {
  if (!e.target.closest('#avatar-btn') && !e.target.closest('#user-menu')) closeMenu();
});
function signOut() {
  removeToken();
  localStorage.removeItem('pmgps_session_id');
  S.sessionId = null;
  navigate('landing');
}

// ─────────────────────────────────────────────
// SESSION
// ─────────────────────────────────────────────
async function createSession() {
  try {
    const d = await apiFetch('/api/session', { method: 'POST' });
    S.sessionId = d.session_id;
    localStorage.setItem('pmgps_session_id', d.session_id);
  } catch(e) {
    // backend unavailable — use a local mock session so the flow continues
    const mock = 'mock-session-' + Date.now();
    S.sessionId = mock;
    localStorage.setItem('pmgps_session_id', mock);
  }
}

// ═══════════════════════════════════════════════════════════
// LANDING
// ═══════════════════════════════════════════════════════════
function renderLanding() {
  document.getElementById('page-landing').innerHTML = `
<div class="min-h-screen bg-navy text-white flex flex-col">
  <div class="max-w-3xl mx-auto px-6 pt-20 pb-16 text-center animate-fade-in flex-1">
    <span class="inline-block px-3 py-1 rounded-full bg-white/10 text-blue-300 text-xs font-semibold mb-8 tracking-widest uppercase">PM-GPS</span>
    <h1 class="text-4xl md:text-5xl font-bold leading-tight mb-6">
      Find your PM role.<br>Not a generic one — yours.
    </h1>
    <p class="text-lg text-slate-300 mb-10 max-w-xl mx-auto">
      Upload your CV, answer 10 questions, and get a personalised map of which PM roles fit your background — and what it takes to get there.
    </p>
    <button onclick="navigate('login')"
      class="bg-primary hover:opacity-90 transition-opacity text-white px-8 py-3 rounded-lg font-semibold text-base">
      Get started — it's free
    </button>
  </div>

  <div class="max-w-5xl mx-auto px-6 pb-20 w-full">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      ${[
        { icon: iconTarget(), title: 'Know your fit',        body: 'We map your background to 11 PM archetypes and tell you how closely you match each.' },
        { icon: iconChart(),  title: 'See your skill gaps',  body: 'For every matched role, you get a clear list of skills you have and skills you need.' },
        { icon: iconBuilding(),title:'Find companies hiring', body: 'We surface companies that hire for your exact PM profile — and flag which ones you can apply to now.' },
      ].map(c => `
        <div class="bg-white/5 border border-white/10 rounded-xl p-6">
          <div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center mb-4">${c.icon}</div>
          <h3 class="font-semibold text-white mb-2">${c.title}</h3>
          <p class="text-slate-400 text-sm">${c.body}</p>
        </div>
      `).join('')}
    </div>
  </div>

  <div class="border-t border-white/10 py-5 text-center">
    <p class="text-slate-500 text-sm">Made for Indian tech professionals</p>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════
function renderLogin() {
  document.getElementById('page-login').innerHTML = `
<div class="min-h-screen bg-secondary flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm animate-fade-in">
    <div class="bg-white border border-border rounded-xl p-8 shadow-sm">
      <h1 class="text-2xl font-bold mb-1">Sign in to continue</h1>
      <p class="text-muted-foreground text-sm mb-6">Get your personalised PM role map</p>
      <div id="login-body">${S.otpSent ? otpFormHTML() : loginFormHTML()}</div>
    </div>
  </div>
</div>`;
}

function loginFormHTML() {
  return `
    <button onclick="loginGoogle()"
      class="w-full flex items-center justify-center gap-3 border border-border rounded-lg px-4 py-2.5 text-sm font-medium hover:bg-secondary transition-colors mb-4">
      ${iconGoogle()} Continue with Google
    </button>
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-border"></div>
      <span class="text-xs text-muted-foreground">or</span>
      <div class="flex-1 h-px bg-border"></div>
    </div>
    <div class="flex gap-2 mb-3">
      <span class="flex items-center border border-border rounded-lg px-3 text-sm text-muted-foreground bg-secondary shrink-0">+91</span>
      <input id="phone-inp" type="tel" maxlength="10" placeholder="Phone number"
        class="flex-1 border border-border rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary"
        onkeydown="if(event.key==='Enter')sendOtp()" />
    </div>
    <button onclick="sendOtp()" class="w-full bg-primary text-white rounded-lg py-2.5 text-sm font-semibold hover:opacity-90 transition-opacity">
      Send OTP
    </button>`;
}

function otpFormHTML() {
  return `
    <p class="text-sm mb-1">OTP sent to <strong>+91 ${S.phone}</strong></p>
    <p class="text-xs text-muted-foreground mb-5">Check your SMS or WhatsApp</p>
    <div class="flex gap-2 justify-center mb-5">
      ${[0,1,2,3,4,5].map(i=>`
        <input type="text" inputmode="numeric" maxlength="1" id="otp${i}"
          class="otp-box"
          oninput="otpIn(this,${i})" onkeydown="otpKey(this,${i},event)" />`).join('')}
    </div>
    <button onclick="verifyOtp()" class="w-full bg-primary text-white rounded-lg py-2.5 text-sm font-semibold hover:opacity-90 mb-3">
      Verify
    </button>
    <button onclick="S.otpSent=false;renderLogin()" class="w-full text-sm text-muted-foreground hover:text-foreground transition-colors">
      Use a different number
    </button>`;
}

function otpIn(el, i) {
  el.value = el.value.replace(/\D/g,'');
  if (el.value && i < 5) document.getElementById(`otp${i+1}`)?.focus();
}
function otpKey(el, i, e) {
  if (e.key === 'Backspace' && !el.value && i > 0) document.getElementById(`otp${i-1}`)?.focus();
}
function getOtp() { return [0,1,2,3,4,5].map(i=>document.getElementById(`otp${i}`)?.value||'').join(''); }

async function loginGoogle() {
  setToken('mock-access-token-' + Date.now());
  S.sessionId = 'mock-session-' + Date.now();
  localStorage.setItem('pmgps_session_id', S.sessionId);
  navigate('upload');
}

async function sendOtp() {
  const ph = document.getElementById('phone-inp')?.value?.trim();
  if (!ph || ph.length !== 10) { toast('Enter a valid 10-digit number','error'); return; }
  S.phone = ph;
  try {
    await apiFetch('/api/auth/otp/send', { method:'POST', body: JSON.stringify({ phone: `+91${ph}` }) });
    S.otpSent = true;
    document.getElementById('login-body').innerHTML = otpFormHTML();
    toast('OTP sent');
  } catch(e) { toast(e.message,'error'); }
}

async function verifyOtp() {
  const otp = getOtp();
  if (otp.length !== 6) { toast('Enter the 6-digit OTP','error'); return; }
  try {
    const d = await apiFetch('/api/auth/otp/verify', { method:'POST',
      body: JSON.stringify({ phone:`+91${S.phone}`, token: otp }) });
    setToken(d.token);
    S.otpSent = false;
    toast('Signed in!','success');
    await createSession();
    navigate('upload');
  } catch(e) { toast(e.message,'error'); }
}

// ═══════════════════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════════════════
function renderUpload() {
  document.getElementById('page-upload').innerHTML = `
<div class="min-h-screen bg-secondary py-10 px-4">
  <div class="max-w-2xl mx-auto animate-fade-in">
    <h1 class="text-2xl font-bold mb-1">Tell us about yourself</h1>
    <p class="text-muted-foreground text-sm mb-8">Start by uploading your CV. Cover letters are optional but help.</p>
    ${docSection('cv',    'CV / Resume',   true)}
    <div class="mt-4">${docSection('cover','Cover Letter', false)}</div>
    <button id="cont-btn" onclick="continueUpload()"
      class="mt-8 w-full bg-primary text-white rounded-lg py-3 font-semibold hover:opacity-90 transition-opacity">
      Continue
    </button>
  </div>
</div>`;
  // re-attach drag events after render
  ['cv','cover'].forEach(t => bindDrop(t));
}

function docSection(type, label, required) {
  const mode = S.uploadMode[type];
  const tabs = [['file','Upload file'],['gdrive','Google Drive'],['text','Paste text']];
  return `
<div class="bg-white border border-border rounded-xl p-6">
  <h2 class="font-semibold mb-4">${label} ${required
    ? '<span class="text-destructive">*</span>'
    : '<span class="text-muted-foreground text-xs font-normal">(optional)</span>'}</h2>
  <div class="flex gap-1 p-1 bg-secondary rounded-lg mb-5 w-fit">
    ${tabs.map(([m,l])=>`
      <button onclick="setMode('${type}','${m}')"
        class="px-3 py-1.5 text-sm rounded-md font-medium transition-colors
        ${mode===m ? 'bg-white text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'}">
        ${l}
      </button>`).join('')}
  </div>
  ${mode==='file'   ? fileZoneHTML(type) :
    mode==='gdrive' ? gdriveHTML(type)   : pasteHTML(type)}
</div>`;
}

function fileZoneHTML(type) {
  return `
<div id="dz-${type}"
  class="border-2 border-dashed border-border rounded-lg p-10 text-center cursor-pointer transition-colors hover:border-primary hover:bg-blue-50"
  onclick="document.getElementById('fi-${type}').click()">
  ${iconUpload()}
  <p class="text-sm text-muted-foreground mt-3">Drag & drop or <span class="text-primary font-medium">click to browse</span></p>
  <p class="text-xs text-muted-foreground mt-1">PDF, DOCX, TXT · Max 10 MB</p>
  <input type="file" id="fi-${type}" class="hidden" accept=".pdf,.docx,.txt" multiple
    onchange="handleFiles(Array.from(this.files),'${type}')" />
</div>
<div id="fl-${type}" class="mt-3 space-y-2"></div>`;
}

function gdriveHTML(type) {
  return `
<div>
  <input id="gd-${type}" type="url" placeholder="https://drive.google.com/file/d/…"
    class="w-full border border-border rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary" />
  <p class="text-xs text-muted-foreground mt-2">Make sure the file is set to 'Anyone with the link can view'</p>
</div>`;
}

function pasteHTML(type) {
  return `
<div>
  <textarea id="pt-${type}" rows="8" maxlength="10000" placeholder="Paste your text here…"
    class="w-full border border-border rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-primary resize-none"
    oninput="document.getElementById('cc-${type}').textContent=this.value.length"></textarea>
  <p class="text-right text-xs text-muted-foreground mt-1"><span id="cc-${type}">0</span>/10,000</p>
</div>`;
}

function setMode(type, mode) { S.uploadMode[type] = mode; renderUpload(); }

function bindDrop(type) {
  const dz = document.getElementById(`dz-${type}`);
  if (!dz) return;
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dz-active'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dz-active'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dz-active');
    handleFiles(Array.from(e.dataTransfer.files), type);
  });
}

function handleFiles(files, type) {
  const allowed = ['application/pdf',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'text/plain'];
  files.forEach(f => {
    if (!allowed.includes(f.type) && !/\.(pdf|docx|txt)$/i.test(f.name)) {
      toast(`${f.name}: unsupported format`, 'error'); return;
    }
    if (f.size > 10*1024*1024) { toast(`${f.name}: exceeds 10 MB`, 'error'); return; }
    S.stagedFiles[type].push(f);
    const fl = document.getElementById(`fl-${type}`);
    if (fl) {
      const d = document.createElement('div');
      d.className = 'flex items-center gap-2 text-sm bg-secondary rounded-lg px-3 py-2';
      d.innerHTML = `${iconFile()}<span class="flex-1 truncate">${f.name}</span><span class="text-muted-foreground text-xs">${(f.size/1024).toFixed(0)} KB</span>`;
      fl.appendChild(d);
    }
  });
}

async function continueUpload() {
  if (!S.sessionId) await createSession();
  if (!S.sessionId) { toast('Could not create session','error'); return; }

  const btn = document.getElementById('cont-btn');
  btn.disabled = true; btn.textContent = 'Uploading…';

  try {
    let hasCv = false;

    for (const type of ['cv','cover']) {
      // file upload
      if (S.stagedFiles[type]?.length) {
        if (type==='cv') hasCv = true;
        try {
          const fd = new FormData();
          fd.append('session_id', S.sessionId);
          S.stagedFiles[type].forEach(f => fd.append('files', f));
          const r = await fetch(`${API_URL}/api/documents/upload`, { method:'POST', headers: authHdr(), body: fd });
          if (r.ok) { const d = await r.json(); S.uploadedDocs.push(...(d.documents||[])); }
        } catch(_) { /* backend unavailable — track locally and continue */ }
      }
      // gdrive
      if (S.uploadMode[type]==='gdrive') {
        const url = document.getElementById(`gd-${type}`)?.value?.trim();
        if (url) {
          if (type==='cv') hasCv = true;
          try {
            const d = await apiFetch('/api/documents/gdrive', { method:'POST',
              body: JSON.stringify({ session_id: S.sessionId, drive_url: url }) });
            S.uploadedDocs.push(d.document);
          } catch(_) { /* continue */ }
        }
      }
      // paste
      if (S.uploadMode[type]==='text') {
        const text = document.getElementById(`pt-${type}`)?.value?.trim();
        if (text) {
          if (type==='cv') hasCv = true;
          try {
            const d = await apiFetch('/api/documents/text', { method:'POST',
              body: JSON.stringify({ session_id: S.sessionId, text }) });
            S.uploadedDocs.push(d.document);
          } catch(_) { /* continue */ }
        }
      }
    }

    // check that the user provided something for CV (regardless of backend success)
    const cvHasFiles  = S.stagedFiles['cv']?.length > 0;
    const cvHasDrive  = S.uploadMode['cv']==='gdrive' && !!document.getElementById('gd-cv')?.value?.trim();
    const cvHasText   = S.uploadMode['cv']==='text'   && !!document.getElementById('pt-cv')?.value?.trim();
    if (!hasCv && !cvHasFiles && !cvHasDrive && !cvHasText) {
      toast('Please provide your CV to continue','error');
      btn.disabled=false; btn.textContent='Continue'; return;
    }
    navigate('questionnaire');
  } catch(e) {
    toast(e.message,'error'); btn.disabled=false; btn.textContent='Continue';
  }
}

// ═══════════════════════════════════════════════════════════
// QUESTIONNAIRE
// ═══════════════════════════════════════════════════════════
function renderQuestionnaire() {
  const step = S.qStep;
  document.getElementById('page-questionnaire').innerHTML = `
<div class="min-h-screen bg-secondary py-10 px-4">

// ── questionnaire widgets ──
function segmented(id, opts, val) {
  return `<div class="inline-flex rounded-lg border border-border bg-secondary p-1 flex-wrap gap-1" id="${id}">
    ${opts.map(o=>`
      <button data-val="${o}" onclick="pickSeg('${id}','${o}')"
        class="rounded-md px-3 py-1.5 text-sm font-medium transition-colors
        ${val===o?'bg-white text-foreground shadow-sm':'text-muted-foreground hover:text-foreground'}">
        ${o}</button>`).join('')}
  </div>`;
}

function chips(id, opts, sel) {
  return `<div class="flex flex-wrap gap-2" id="${id}">
    ${opts.map(o=>`
      <button data-val="${o}" onclick="toggleChip('${id}','${o.replace(/'/g,"\\'")}')"
        class="rounded-full px-3 py-1.5 text-sm border font-medium transition-colors
        ${sel.includes(o)?'border-primary bg-primary text-white':'border-border bg-white hover:border-primary/50'}">
        ${o}</button>`).join('')}
  </div>`;
}

function pickSeg(id, val) {
  document.querySelectorAll(`#${id} button`).forEach(b => {
    const active = b.dataset.val === val;
    b.className = b.className
      .replace('bg-white text-foreground shadow-sm','')
      .replace('text-muted-foreground hover:text-foreground','');
    b.className += active
      ? ' bg-white text-foreground shadow-sm'
      : ' text-muted-foreground hover:text-foreground';
  });
}

function toggleChip(id, val) {
  const btn = document.querySelector(`#${id} [data-val="${val}"]`);
  if (!btn) return;
  const on = btn.classList.contains('bg-primary');
  if (on) {
    btn.classList.remove('border-primary','bg-primary','text-white');
    btn.classList.add('border-border','bg-white');
  } else {
    btn.classList.add('border-primary','bg-primary','text-white');
    btn.classList.remove('border-border','bg-white');
  }
}

function pickTech(n) {
  S.qData.tech_comfort = n;
  document.querySelectorAll('#q-tech button').forEach(b => {
    const on = parseInt(b.dataset.val) === n;
    b.className = b.className
      .replace('bg-primary text-white border-primary','')
      .replace('border-border hover:border-primary/50','');
    b.className += on ? ' bg-primary text-white border-primary' : ' border-border hover:border-primary/50';
  });
}

function segVal(id) {
  return document.querySelector(`#${id} .bg-white`)?.dataset?.val || null;
}
function chipVals(id) {
  return Array.from(document.querySelectorAll(`#${id} .bg-primary`)).map(b=>b.dataset.val);
}

function collectStep(step) {
  const d = S.qData;
  if (step===1) {
    d.current_role  = document.getElementById('q-role')?.value?.trim()||'';
    d.experience    = segVal('q-exp')||'3–5';
    d.company_types = chipVals('q-co');
    d.industries    = chipVals('q-ind');
  } else if (step===2) {
    d.writes_code  = segVal('q-code')||'Sometimes';
    d.ai_exposure  = segVal('q-ai')||'None';
    d.roadmap_exp  = segVal('q-road')||'No';
    // tech_comfort set directly by pickTech
  } else {
    d.archetypes     = chipVals('q-arch');
    d.company_stage  = chipVals('q-stage');
    d.geography      = document.getElementById('q-geo')?.value||'Pan-India';
    d.open_to_outside= segVal('q-open')||'Open to it';
  }
}

function qBack() { collectStep(S.qStep); S.qStep--; renderQuestionnaire(); }

async function qNext() {
  collectStep(S.qStep);
  if (S.qStep===1 && !S.qData.current_role) { toast('Please enter your current role','error'); return; }
  if (S.qStep < 3) { S.qStep++; renderQuestionnaire(); }
  else {
    try {
      await apiFetch('/api/questionnaire', { method:'POST',
        body: JSON.stringify({ session_id: S.sessionId, responses: S.qData }) });
    } catch(_) { /* backend unavailable — continue anyway */ }
    navigate('processing');
  }
}

let _procStep = 0, _procTick = null, _subTick = null;

const SUBTEXTS = [
  'Reviewing 11 PM archetypes against your background…',
  'Identifying your strongest transferable skills…',
  'Finding companies hiring for your profile…',
];
const STEP_META = [
  { label: 'Reading your documents',  icon: iconFileSearch },

function renderProcessing() {
  _procStep = 0;
  clearProcIntervals();
  document.getElementById('page-processing').innerHTML = `
<div class="min-h-screen bg-secondary flex flex-col items-center justify-center px-4">
  <div class="text-center max-w-md w-full animate-fade-in">
    <div class="text-2xl font-bold text-navy mb-10">PM-GPS</div>
    <div class="space-y-3 mb-10">
      ${STEP_META.map((_,i)=>procStepHTML(i)).join('')}
    </div>
    <p id="subtext" class="text-sm text-muted-foreground">${SUBTEXTS[0]}</p>
  </div>
</div>`;

  // trigger backend
  apiFetch('/api/process', { method:'POST', body: JSON.stringify({ session_id: S.sessionId }) })
    .catch(e => console.warn('Process trigger:', e.message));

  // set first step active
  setProcStep(0,'active');

  // rotate subtext
  let si = 0;
  _subTick = setInterval(() => {
    si = (si+1) % SUBTEXTS.length;
    const el = document.getElementById('subtext');
    if (el) el.textContent = SUBTEXTS[si];
  }, 4000);

  // advance steps visually every 8s
  _procTick = setInterval(() => {
    if (_procStep < 2) {
      setProcStep(_procStep,'done');
      _procStep++;
      setProcStep(_procStep,'active');
    }
  }, 8000);

  // safety timeout 120s
  setTimeout(() => { if (currentPage()==='processing') showProcError(); }, 120000);

  // WebSocket — graceful: if backend is down, auto-advance after animation completes
  try {
    const sock = io(API_URL, { transports:['websocket'], timeout: 3000, reconnectionAttempts: 1 });
    S.socket = sock;
    sock.on('connect', () => sock.emit('join_session', { session_id: S.sessionId }));
    sock.on('results_ready', () => {
      clearProcIntervals();
      setProcStep(0,'done'); setProcStep(1,'done'); setProcStep(2,'done');
      setTimeout(() => navigate('results'), 700);
    });
    sock.on('processing_failed', () => { clearProcIntervals(); showProcError(); });
    sock.on('connect_error', () => { /* will fall through to the auto-advance timer below */ });
  } catch(_) { /* socket.io not available */ }

  // Auto-advance: if no WebSocket signal after all 3 steps animate (~24s), go to results
  setTimeout(() => {
    if (currentPage() === 'processing') {
      clearProcIntervals();
      setProcStep(0,'done'); setProcStep(1,'done'); setProcStep(2,'done');
      setTimeout(() => navigate('results'), 600);
    }
  }, 25000);
}

function procStepHTML(i) {
  return `
<div id="ps-${i}" class="flex items-center gap-4 bg-secondary border border-border rounded-xl px-5 py-4">
  <div id="pi-${i}" class="w-10 h-10 rounded-lg bg-secondary flex items-center justify-center shrink-0">
    ${STEP_META[i].icon('text-muted-foreground')}
  </div>
  <span id="pl-${i}" class="text-sm font-medium text-muted-foreground">${STEP_META[i].label}</span>
</div>`;
}

function setProcStep(i, state) {
  const row = document.getElementById(`ps-${i}`);
  const ico = document.getElementById(`pi-${i}`);
  const lbl = document.getElementById(`pl-${i}`);
  if (!row) return;
  if (state==='active') {
    row.className = 'flex items-center gap-4 bg-blue-50 border border-primary rounded-xl px-5 py-4';
    ico.className = 'w-10 h-10 rounded-lg bg-primary flex items-center justify-center shrink-0';
    ico.innerHTML = `<svg class="animate-spin text-white" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
    lbl.className = 'text-sm font-medium text-foreground';
  } else if (state==='done') {
    row.className = 'flex items-center gap-4 bg-green-50 border border-green-200 rounded-xl px-5 py-4';
    ico.className = 'w-10 h-10 rounded-lg bg-success flex items-center justify-center shrink-0';
    ico.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    lbl.className = 'text-sm font-medium text-success';
  }
}

function clearProcIntervals() {
  clearInterval(_procTick); clearInterval(_subTick);
  _procTick = null; _subTick = null;
  if (S.socket) { S.socket.disconnect(); S.socket = null; }
}

function showProcError() {
  document.getElementById('page-processing').innerHTML = `
<div class="min-h-screen bg-secondary flex flex-col items-center justify-center px-4 text-center">
  <div class="max-w-sm">
    <div class="text-2xl font-bold text-navy mb-6">PM-GPS</div>
    <p class="font-medium mb-2">Something went wrong.</p>
    <p class="text-muted-foreground text-sm mb-6">Please go back and try again.</p>
    <button onclick="navigate('questionnaire')" class="bg-primary text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:opacity-90">
      Try again
    </button>
  </div>
</div>`;
}

function selectRole(role) { S.selectedRole = role; renderResults(); }

function startOver() {
  S.uploadedDocs = []; S.qStep = 1; S.qData = {};
  S.selectedRole = null; S.stagedFiles = { cv:[], cover:[] };
  S.sessionId = null;
  localStorage.removeItem('pmgps_session_id');
  navigate('upload');
}
